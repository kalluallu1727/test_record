services:
  - type: web
    name: ivr-backend
    runtime: node
    buildCommand: NODE_OPTIONS=--max-old-space-size=512 npm install
    startCommand: node server.js
    envVars:
      # ── Required ──────────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

      # ── Twilio ───────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY
        sync: false
      - key: TWILIO_API_SECRET
        sync: false
      - key: TWILIO_TWIML_APP_SID
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

      # ── Deepgram ─────────────────────────────────────────────────
      - key: DEEPGRAM_API_KEY
        sync: false

      # ── App base URL (set to your Render service URL) ──────────
      - key: APP_BASE_URL
        sync: false

      # ── Optional ──────────────────────────────────────────────
      - key: CORS_ORIGIN
        sync: false
